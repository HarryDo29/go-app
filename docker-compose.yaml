version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: go-app-mysql
    restart: always
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: go-app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Tùy chọn: thiết lập timezone hoặc charset nếu cần
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:latest
    container_name: go-app-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Set password cho redis dựa trên cấu hình local.yaml
    command: redis-server --requirepass password

  mongodb:
    image: mongo:7.0.34-jammy
    container_name: go-app-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  minio_data:
    driver: local


